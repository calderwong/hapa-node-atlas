<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hapa Second Brain Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --panel: rgba(9, 17, 31, 0.86);
        --panel-2: rgba(15, 23, 42, 0.76);
        --line: rgba(125, 211, 252, 0.25);
        --text: #e5edf8;
        --muted: #94a3b8;
        --cyan: #22d3ee;
        --fuchsia: #d946ef;
        --amber: #f59e0b;
        --green: #34d399;
        --rose: #fb7185;
        --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background:
          linear-gradient(rgba(34, 211, 238, 0.028) 1px, transparent 1px),
          linear-gradient(90deg, rgba(217, 70, 239, 0.022) 1px, transparent 1px),
          linear-gradient(135deg, #020617, #030712 52%, #09111f);
        background-size: 24px 24px, 24px 24px, auto;
        color: var(--text);
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        grid-template-rows: 72px minmax(0, 1fr);
      }

      .topbar {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        background: rgba(2, 6, 23, 0.82);
        position: sticky;
        top: 0;
        z-index: 5;
      }

      .micro,
      .chip,
      .stat,
      label,
      .tab,
      code {
        font-family: var(--mono);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .micro {
        color: var(--muted);
        font-size: 0.68rem;
      }

      h1 {
        font-size: clamp(1.35rem, 3vw, 2.1rem);
        letter-spacing: 0;
        line-height: 1.05;
      }

      .status-strip {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0 10px;
        color: #cbd5e1;
        font-family: var(--mono);
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        background: rgba(15, 23, 42, 0.72);
      }

      .status-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 18px var(--green);
      }

      .sidebar {
        overflow-y: auto;
        padding: 12px;
        border-right: 1px solid var(--line);
      }

      .main {
        overflow: auto;
        padding: 12px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.24);
        margin-bottom: 10px;
        overflow: hidden;
      }

      .panel-pad {
        padding: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 0.68rem;
      }

      .search-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 82px;
        gap: 8px;
        margin-top: 8px;
      }

      input,
      select,
      button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(2, 6, 23, 0.78);
        color: var(--text);
      }

      input,
      select {
        width: 100%;
        padding: 0 10px;
      }

      button {
        cursor: pointer;
        padding: 0 12px;
      }

      button:hover,
      input:focus,
      select:focus {
        border-color: var(--cyan);
        outline: none;
      }

      .tabs {
        display: grid;
        gap: 6px;
        padding: 10px;
      }

      .tab {
        text-align: left;
        color: #cbd5e1;
        font-size: 0.68rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .tab.active {
        border-color: var(--cyan);
        background: rgba(8, 47, 73, 0.72);
        box-shadow: inset 3px 0 0 var(--cyan);
      }

      .tab span {
        color: var(--muted);
        font-size: 0.58rem;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .stat {
        min-height: 70px;
        display: grid;
        align-content: center;
        gap: 4px;
        border: 1px solid rgba(125, 211, 252, 0.16);
        border-radius: 8px;
        background: rgba(2, 6, 23, 0.54);
        padding: 10px;
        color: var(--muted);
        font-size: 0.66rem;
      }

      .stat strong {
        color: var(--text);
        font-size: 1.2rem;
        letter-spacing: 0;
      }

      code {
        display: block;
        color: #bae6fd;
        font-size: 0.66rem;
        line-height: 1.7;
        overflow-wrap: anywhere;
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(300px, 0.8fr);
        gap: 10px;
      }

      .hero-card {
        position: relative;
        min-height: 300px;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: #020617;
      }

      .hero-card img {
        width: 100%;
        height: 100%;
        min-height: 300px;
        object-fit: cover;
        opacity: 0.74;
      }

      .hero-copy {
        position: absolute;
        inset: auto 16px 16px 16px;
        display: grid;
        gap: 8px;
      }

      .hero-copy p:last-child {
        color: #dbeafe;
        max-width: 66ch;
        line-height: 1.55;
      }

      .content-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 10px;
      }

      .view-stack {
        display: grid;
        gap: 10px;
      }

      .view-hero {
        position: relative;
        min-height: 238px;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background:
          linear-gradient(90deg, rgba(2, 6, 23, 0.94), rgba(2, 6, 23, 0.68), rgba(2, 6, 23, 0.34)),
          var(--hero-image, url("../../assets/second-brain-ai-hero.png")) center / cover no-repeat;
      }

      .view-hero-copy {
        position: absolute;
        inset: auto 16px 16px 16px;
        display: grid;
        gap: 8px;
        max-width: 860px;
      }

      .view-hero-copy h2 {
        font-size: clamp(1.7rem, 4vw, 3.5rem);
        line-height: 0.98;
        letter-spacing: 0;
      }

      .view-hero-copy p:last-child {
        color: #dbeafe;
        line-height: 1.55;
        max-width: 76ch;
      }

      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .kpi {
        min-height: 84px;
        border: 1px solid rgba(125, 211, 252, 0.18);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(8, 47, 73, 0.42), rgba(2, 6, 23, 0.68)),
          rgba(2, 6, 23, 0.6);
        padding: 12px;
        display: grid;
        align-content: center;
        gap: 4px;
      }

      .kpi strong {
        font-family: var(--mono);
        font-size: 1.45rem;
        letter-spacing: 0;
      }

      .kpi span {
        color: var(--muted);
        font-family: var(--mono);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.64rem;
      }

      .wide {
        grid-column: 1 / -1;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 44px;
        padding: 10px 12px;
        border-bottom: 1px solid rgba(125, 211, 252, 0.16);
        background: rgba(2, 6, 23, 0.46);
      }

      .list {
        display: grid;
        gap: 8px;
        padding: 10px;
      }

      .row {
        display: grid;
        gap: 6px;
        border: 1px solid rgba(125, 211, 252, 0.16);
        border-radius: 8px;
        padding: 10px;
        background: rgba(2, 6, 23, 0.52);
      }

      .row strong {
        letter-spacing: 0;
      }

      .row p {
        color: var(--muted);
        line-height: 1.42;
      }

      .row-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .row-meta {
        color: #fde68a;
        font-family: var(--mono);
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        white-space: nowrap;
      }

      .chips {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .chip {
        color: #bae6fd;
        border: 1px solid rgba(125, 211, 252, 0.18);
        border-radius: 999px;
        background: rgba(8, 47, 73, 0.36);
        padding: 5px 7px;
        font-size: 0.6rem;
      }

      .chip.gold {
        color: #fde68a;
        border-color: rgba(245, 158, 11, 0.28);
        background: rgba(120, 53, 15, 0.3);
      }

      .chip.green {
        color: #bbf7d0;
        border-color: rgba(52, 211, 153, 0.26);
        background: rgba(6, 78, 59, 0.28);
      }

      .matrix {
        display: grid;
        gap: 8px;
        padding: 10px;
      }

      .matrix-row {
        display: grid;
        grid-template-columns: minmax(160px, 0.7fr) minmax(0, 1fr) 84px;
        gap: 10px;
        align-items: center;
        border: 1px solid rgba(125, 211, 252, 0.14);
        border-radius: 8px;
        background: rgba(2, 6, 23, 0.5);
        padding: 9px 10px;
      }

      .meter {
        height: 7px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.16);
        overflow: hidden;
      }

      .meter i {
        display: block;
        width: var(--pct, 50%);
        height: 100%;
        background: linear-gradient(90deg, var(--cyan), var(--fuchsia), var(--amber));
      }

      .callout {
        border: 1px solid rgba(245, 158, 11, 0.22);
        border-radius: 8px;
        background: rgba(120, 53, 15, 0.18);
        color: #fde68a;
        line-height: 1.5;
      }

      @media (max-width: 980px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .dashboard-grid,
        .content-grid,
        .kpi-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 620px) {
        body {
          min-width: 0;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
          position: static;
          padding: 12px;
        }

        .sidebar,
        .main {
          overflow: visible;
          padding: 10px;
        }

        .sidebar {
          display: grid;
          gap: 10px;
        }

        .panel {
          margin-bottom: 0;
        }

        .tabs {
          display: flex;
          gap: 8px;
          overflow-x: auto;
          padding: 8px;
          scrollbar-width: thin;
          -webkit-overflow-scrolling: touch;
        }

        .tab {
          flex: 0 0 auto;
          justify-content: center;
          min-width: 136px;
          min-height: 44px;
          text-align: center;
        }

        .tab.active {
          box-shadow: inset 0 -3px 0 var(--cyan);
        }

        .stat-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .search-row {
          grid-template-columns: minmax(0, 1fr) 82px;
        }

        .view-hero {
          min-height: 270px;
        }

        .view-hero-copy {
          inset: auto 12px 12px 12px;
        }

        .view-hero-copy h2 {
          font-size: clamp(1.35rem, 8vw, 2rem);
          line-height: 1.02;
        }

        .view-hero-copy p:last-child {
          font-size: 0.92rem;
        }

        .section-head,
        .row-top {
          align-items: flex-start;
          flex-wrap: wrap;
        }

        .row-top strong {
          min-width: 0;
          overflow-wrap: anywhere;
        }

        .row-meta {
          white-space: normal;
        }

        .matrix-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

            ["Continuous Sharpening Bruce Lee Compression", "openai", "wiki_article", "hero", "generated"],
            ["Hermes Delegation Agent Harness", "openai", "wiki_article", "hero", "generated"],
            ["Avatar Lineage Trellis Gate", "openai", "wiki_article", "hero", "generated"],
            ["Second Brain Enrichment Deployment Map", "openai", "wiki_article", "hero", "generated"],
            ["Media Pipeline / Video Production", "openai", "skill", "skill_hero", "generated"],
          ],
        },
        wiki: {
          protocolTypes: [["protocol_card", 11], ["protocol", 5], ["architecture", 4], ["operations_protocol", 2], ["media_queue_protocol", 1], ["agent_harness_registry", 1], ["status_ui_protocol", 1]],
          protocols: [
            ["Avatar Lineage Trellis Gate", "protocol_card", "Preserve source images, generated variants, reviewed facts, lineage manifests, and Trellis-safe source decisions."],
            ["Continuous Sharpening Bruce Lee Compression", "protocol_card", "Absorb what is useful, discard what is not, add what is specifically Hapa, and improve retrieval after use."],
            ["Every Which Way", "protocol_card", "When compute is cheap or time allows, reopen alternatives and append what improves the system."],
            ["For The Throat", "protocol_card", "Solve inside the deadline, ship the minimum acceptable result, and leave enough foundation to sharpen later."],
            ["Hapa Nodes, Capabilities, Skills Protocol", "protocol", "Treat nodes, capabilities, skills, visual prompts, timeline effort, and graph visibility as first-class entities."],
            ["Protocol Spine UI API CLI Parity", "protocol_card", "One capability gets one source contract and comparable UI, API, CLI, test, fixture, and documentation surfaces."],
          ],
          docs: [
            ["Hapa Node Map", "doc", "Current local source repos as parts of one Hapa ecosystem."],
            ["Hapa Protocol Standards", "doc", "App-facing implementation summary for capability parity and durable memory."],
            ["Hapa Operating Model", "doc", "Source-of-truth hierarchy for code, canon, state, and cross-agent handoffs."],
            ["Hapa Node Space API", "doc", "Feature spine, Electron IPC handlers, and CLI/API surfaces."],
            ["Hapa Protocol Cards", "doc", "Generated thumbnail art and lore-forward protocol card series."],
            ["Hapa Process Flow Cards", "doc", "Multi-node Hapa actions as teachable process cards."],
          ],
        },
      };

      const sectionMeta = {
        context: ["AGENT CONTEXT PACK", "What You Know, How, And From Where", "Hybrid context across AI turns, cards, wiki pages, topic groups, capabilities, media jobs, and source-backed claims."],
        capabilities: ["NODE CAPABILITY SKILLS", "Capabilities As Working Skill Bridges", "Hapa nodes become usable by mapping general skills to node-specific modes, evidence, success signals, and card/wiki links."],
        items: ["SOURCE MATRIX", "Items, Exposures, And Retrieval Lanes", "The Second Brain tracks the intake layer: wiki pages, videos, cards, artifacts, watch history, reading, songs, and dependencies."],
        topics: ["TOPIC GRAPH", "Topic Profiles And Evidence Concentrations", "Topics compress source items, turns, entities, and skill evidence into navigable retrieval clusters."],
        agents: ["AGENT REGISTRY", "Agents, Harnesses, And Memory Posture", "Agent profiles describe what each collaborator is good for and which local harness gives it durable context."],
        production: ["MEDIA PRODUCTION", "Generation Queue, Assets, And Visual Proof", "Media jobs are outward proof: hero images, thumbnails, skill heroes, capability heroes, and video directions."],
        wiki: ["WIKI + PROTOCOLS", "Protocol Articles And Documentation Spine", "Wiki records, protocol cards, docs, and contracts turn private work into inspectable operating knowledge."],
      };

      const sectionHeroes = {
        context: "../../assets/second-brain-heroes/context.jpg",
        capabilities: "../../assets/second-brain-heroes/capabilities.jpg",
        items: "../../assets/second-brain-heroes/items.jpg",
        topics: "../../assets/second-brain-heroes/topics.jpg",
        agents: "../../assets/second-brain-heroes/agents.jpg",
        production: "../../assets/second-brain-heroes/production.jpg",
        wiki: "../../assets/second-brain-heroes/wiki.jpg",
      };

      const state = {
        section: "context",
        query: "",
      };

      const fmt = (value) => new Intl.NumberFormat("en-US").format(Number(value || 0));
      const compact = (value) => new Intl.NumberFormat("en-US", { notation: "compact", maximumFractionDigits: 1 }).format(Number(value || 0));
      const pretty = (value) => String(value || "").replaceAll("_", " ").replace(/\b\w/g, (letter) => letter.toUpperCase());
      const esc = (value) => String(value || "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;");
      const matchesQuery = (row) => !state.query || JSON.stringify(row).toLowerCase().includes(state.query.toLowerCase());

      function chips(items, tone = "") {
        return `<div class="chips">${items.filter(Boolean).map((item) => `<span class="chip ${tone}">${esc(item)}</span>`).join("")}</div>`;
      }

      function row(title, body, tags = [], meta = "") {
        return `<article class="row">
          <div class="row-top"><strong>${esc(title)}</strong>${meta ? `<span class="row-meta">${esc(meta)}</span>` : ""}</div>
          <p>${esc(body)}</p>
          ${chips(tags)}
        </article>`;
      }

      function panel(title, meta, body, wide = false) {
        return `<section class="panel ${wide ? "wide" : ""}">
          <div class="section-head"><h2>${esc(title)}</h2><span class="micro">${esc(meta)}</span></div>
          ${body}
        </section>`;
      }

      function list(rows) {
        return `<div class="list">${rows.length ? rows.join("") : row("No matching records", "Try a broader query or switch sections.", ["empty"])}</div>`;
      }

      function kpis(items) {
        return `<section class="kpi-grid">${items.map(([value, label]) => `<div class="kpi"><strong>${esc(value)}</strong><span>${esc(label)}</span></div>`).join("")}</section>`;
      }

      function matrix(rows, maxValueIndex = 2) {
        const max = Math.max(...rows.map((item) => Number(item[maxValueIndex] || 0)), 1);
        return `<div class="matrix">${rows.map((item) => {
          const pct = Math.max(3, Math.round((Number(item[maxValueIndex] || 0) / max) * 100));
          return `<div class="matrix-row">
            <strong>${esc(pretty(item[0]))}</strong>
            <div class="meter"><i style="--pct:${pct}%"></i></div>
            <span class="row-meta">${esc(fmt(item[maxValueIndex]))}</span>
          </div>`;
        }).join("")}</div>`;
      }

      function hero() {
        const meta = sectionMeta[state.section];
        const image = sectionHeroes[state.section] || "../../assets/second-brain-ai-hero.png";
        const queryCopy = state.query ? ` Active query: ${state.query}.` : "";
        return `<section class="view-hero" style="--hero-image:url('${esc(image)}')">
          <div class="view-hero-copy">
            <p class="micro">${esc(meta[0])}</p>
            <h2>${esc(meta[1])}</h2>
            <p>${esc(meta[2] + queryCopy)}</p>
          </div>
        </section>`;
      }

      function renderContext() {
        const sourceRows = secondBrain.sourceSystems.filter(matchesQuery).map(([name, items, exposures, medium, body]) =>
          row(pretty(name), body, [medium, `${fmt(exposures)} exposures`], `${fmt(items)} items`)
        );
        const laneRows = secondBrain.contextLanes.filter(matchesQuery).map(([title, body, tags, meta]) => row(title, body, tags, meta));
        const cardRows = secondBrain.cards.filter(matchesQuery).map(([title, body, tags]) => row(title, body, tags, "card"));
        return [
          kpis([[fmt(secondBrain.summary.items), "source items"], [fmt(secondBrain.summary.topics), "topics"], [fmt(secondBrain.summary.turns), "AI turns"], [fmt(secondBrain.summary.bridges), "capability bridges"]]),
          `<div class="dashboard-grid">${panel("Source Blend", "ranked", list(sourceRows))}${panel("Context Lanes", "retrieval", list(laneRows))}</div>`,
          `<div class="content-grid">${panel("Hapa Cards", "distilled", list(cardRows))}${panel("Refresh State", "projection", `<div class="panel-pad callout">Generated ${esc(secondBrain.summary.generatedLabel)} from the local Second Brain projection. The public brochure keeps this as static, inspectable demo data while preserving the same node vocabulary.</div>`)}</div>`,
        ].join("");
      }

      function renderCapabilities() {
        const familyRows = secondBrain.skillFamilies.filter(matchesQuery);
        const capRows = secondBrain.capabilities.filter(matchesQuery).map(([title, nodeName, mode, links, body]) =>
          row(title, body, [nodeName, mode, "skill bridge"], `${links} links`)
        );
        return [
          kpis([[fmt(secondBrain.summary.skills), "skills"], [fmt(secondBrain.summary.evidenceXp), "evidence XP"], [fmt(secondBrain.summary.capabilities), "node skills"], [fmt(secondBrain.summary.bridges), "bridges"]]),
          `<div class="content-grid">${panel("Skill Families", "evidence", matrix(familyRows, 2))}${panel("Capability Bridges", "top routes", list(capRows))}</div>`,
          panel("Operational Rule", "parity", `<div class="panel-pad callout">A capability is useful when it can be inspected through UI, API, CLI, docs, tests, fixtures, evidence links, and a node-owned action path.</div>`, true),
        ].join("");
      }

      function renderItems() {
        const sourceRows = secondBrain.sourceSystems.filter(matchesQuery).map(([name, items, exposures, medium, body]) =>
          row(pretty(name), body, [medium, `${fmt(exposures)} exposures`], `${fmt(items)} items`)
        );
        const mediumRows = [
          row("Content Items", "Normalized top-level records from wiki, videos, cards, artifacts, watch history, reading, songs, and dependencies.", ["content_items"], fmt(secondBrain.summary.items)),
          row("Chunks", "Text chunks support search, context packing, source-backed claims, and agent retrieval.", ["content_texts", "retrieval"], fmt(secondBrain.summary.chunks)),
          row("Entities", "Actors, tools, nodes, creators, places, models, and protocols become graphable entities.", ["entity index"], fmt(secondBrain.summary.entities)),
          row("Exposures", "Repeat encounters preserve what was seen, heard, read, watched, or used more than once.", ["attention trail"], fmt(secondBrain.summary.exposures)),
        ];
        return [
          kpis([[fmt(secondBrain.summary.items), "items"], [fmt(secondBrain.summary.exposures), "exposures"], [fmt(secondBrain.summary.chunks), "chunks"], [fmt(secondBrain.summary.entities), "entities"]]),
          `<div class="content-grid">${panel("Source Systems", "intake", list(sourceRows))}${panel("Retrieval Units", "schema", list(mediumRows))}</div>`,
        ].join("");
      }

      function renderTopics() {
        const topicRows = secondBrain.topics.filter(matchesQuery).map(([label, items, evidence, sources, skills, type, body]) =>
          row(label, body, [pretty(type), `${sources} sources`, `${skills} skills`], `${fmt(items)} items`)
        );
        const topTopicMatrix = secondBrain.topics.filter(matchesQuery).slice(0, 8).map((topic) => [topic[0], topic[1]]);
        return [
          kpis([[fmt(secondBrain.summary.topics), "topics"], [fmt(24187), "skill-topic links"], [fmt(secondBrain.summary.evidenceXp), "evidence XP"], [fmt(secondBrain.summary.nodes), "nodes"]]),
          `<div class="content-grid">${panel("Topic Profiles", "ranked", list(topicRows))}${panel("Item Density", "top topics", matrix(topTopicMatrix, 1))}</div>`,
        ].join("");
      }

      function renderAgents() {
        const agentRows = secondBrain.agents.filter(matchesQuery).map(([name, provider, kind, status, skills, body]) =>
          row(name, body, [provider, pretty(kind), status], `${skills} skills`)
        );
        const harnessRows = secondBrain.harnesses.filter(matchesQuery).map(([name, runtime, body]) => row(name, body, [runtime, "context harness"], "ready"));
        return [
          kpis([[fmt(secondBrain.summary.agents), "agents"], [fmt(secondBrain.summary.harnesses), "harnesses"], [fmt(secondBrain.summary.learningLinks), "learning links"], [fmt(secondBrain.summary.resultLinks), "result links"]]),
          `<div class="content-grid">${panel("Agent Profiles", "registry", list(agentRows))}${panel("Harnesses", "runtime posture", list(harnessRows))}</div>`,
        ].join("");
      }

      function renderProduction() {
        const statusRows = secondBrain.production.statuses.filter(matchesQuery).map(([name, count]) =>
          row(pretty(name), "Media queue state for generated, queued, or source-waiting records.", ["queue"], fmt(count))
        );
        const jobRows = secondBrain.production.jobs.filter(matchesQuery).map(([title, provider, target, roleName, status]) =>
          row(title, `${provider} ${target} asset routed through the ${roleName} lane.`, [provider, target, roleName], status)
        );
        return [
          kpis([[fmt(secondBrain.summary.mediaJobs), "media jobs"], [fmt(443), "generated"], [fmt(347), "queued"], [fmt(265), "waiting for image"]]),
          `<div class="content-grid">${panel("Queue Status", "live lanes", list(statusRows))}${panel("Recent Proof Assets", "examples", list(jobRows))}</div>`,
          `<div class="content-grid">${panel("Providers", "counts", matrix(secondBrain.production.providers, 1))}${panel("Asset Roles", "distribution", matrix(secondBrain.production.roles, 1))}</div>`,
        ].join("");
      }

      function renderWiki() {
        const protocolRows = secondBrain.wiki.protocols.filter(matchesQuery).map(([title, type, body]) => row(title, body, [pretty(type), "wiki"], "article"));
        const docRows = secondBrain.wiki.docs.filter(matchesQuery).map(([title, type, body]) => row(title, body, [type, "doc spine"], "doc"));
        return [
          kpis([[fmt(secondBrain.summary.wikiArticles), "wiki articles"], [fmt(32), "protocol records"], [fmt(21), "docs"], [fmt(10), "contracts"]]),
          `<div class="content-grid">${panel("Protocol Articles", "wiki", list(protocolRows))}${panel("Documentation Spine", "local docs", list(docRows))}</div>`,
          panel("Protocol Types", "index", matrix(secondBrain.wiki.protocolTypes, 1), true),
        ].join("");
      }

      const renderers = {
        context: renderContext,
        capabilities: renderCapabilities,
        items: renderItems,
        topics: renderTopics,
        agents: renderAgents,
        production: renderProduction,
        wiki: renderWiki,
      };

      function render() {
        document.querySelectorAll("[data-section]").forEach((button) => {
          const active = button.dataset.section === state.section;
          button.classList.toggle("active", active);
          button.setAttribute("aria-selected", String(active));
        });
        const root = document.querySelector("#mainView");
        root.innerHTML = `<div class="view-stack">${hero()}${renderers[state.section]()}</div>`;
      }

      document.querySelectorAll("[data-section]").forEach((button) => {
        button.addEventListener("click", () => {
          state.section = button.dataset.section;
          render();
        });
      });

      document.querySelector("#runSearch").addEventListener("click", () => {
        state.query = document.querySelector("#queryInput").value.trim();
        render();
      });

      document.querySelector("#queryInput").addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          state.query = event.currentTarget.value.trim();
          render();
        }
      });

      render();
    </script>
  </body>
</html>
